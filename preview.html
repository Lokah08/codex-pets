<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex Pet Preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #1e1c1c;
      --panel: #282326;
      --panel-soft: #342c31;
      --text: #f5d9f3;
      --muted: #b58aae;
      --accent: #e877ff;
      --border: #4f3f49;
      --cell-w: 192px;
      --cell-h: 208px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      display: grid;
      min-height: 100vh;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .group {
      margin-top: 22px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .controls {
      display: grid;
      gap: 8px;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      text-align: left;
      padding: 8px 10px;
    }

    button:hover {
      border-color: color-mix(in srgb, var(--accent), var(--border) 35%);
      color: white;
    }

    button[aria-pressed="true"] {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 18%, var(--panel-soft));
      color: white;
    }

    .stage-wrap {
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 36px;
    }

    .stage {
      display: grid;
      width: min(760px, 100%);
      justify-items: center;
      gap: 22px;
    }

    .pet-name {
      color: var(--accent);
      font-size: 18px;
      font-weight: 700;
    }

    .viewport {
      display: grid;
      width: min(100%, 560px);
      min-height: 420px;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      background:
        linear-gradient(45deg, #262126 25%, transparent 25%),
        linear-gradient(-45deg, #262126 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #262126 75%),
        linear-gradient(-45deg, transparent 75%, #262126 75%),
        #211d20;
      background-position: 0 0, 0 14px, 14px -14px, -14px 0;
      background-size: 28px 28px;
      overflow: hidden;
    }

    .sprite {
      width: var(--cell-w);
      height: var(--cell-h);
      image-rendering: pixelated;
      background-repeat: no-repeat;
      background-size: 800% 900%;
      transform: scale(1.75);
      transform-origin: center;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 760px) {
      main {
        grid-template-columns: 1fr;
      }

      aside {
        border-right: 0;
        border-bottom: 1px solid var(--border);
      }

      .stage-wrap {
        min-height: auto;
        padding: 24px 16px;
      }

      .viewport {
        min-height: 340px;
      }

      .sprite {
        transform: scale(1.25);
      }
    }
  </style>
</head>
<body>
  <main>
    <aside>
      <h1>Codex Pet Preview</h1>
      <p class="subtitle">Switch pets and animation states without waiting for the Codex app to enter that state.</p>

      <section class="group" aria-labelledby="pet-label">
        <span class="label" id="pet-label">Pet</span>
        <div class="controls" id="petControls"></div>
      </section>

      <section class="group" aria-labelledby="state-label">
        <span class="label" id="state-label">State</span>
        <div class="controls" id="stateControls"></div>
      </section>
    </aside>

    <section class="stage-wrap">
      <div class="stage">
        <div class="pet-name" id="title"></div>
        <div class="viewport">
          <div class="sprite" id="sprite" aria-hidden="true"></div>
        </div>
        <div class="meta" id="meta"></div>
      </div>
    </section>
  </main>

  <script>
    const pets = [
      { id: "lumo", name: "Lumo", url: "pets/lumo/spritesheet.webp" },
      { id: "cherry", name: "Cherry", url: "pets/cherry/spritesheet.webp" },
    ];

    const states = {
      idle: { label: "Idle", row: 0, frames: 6, duration: 150 },
      "running-right": { label: "Running Right", row: 1, frames: 8, duration: 120 },
      "running-left": { label: "Running Left", row: 2, frames: 8, duration: 120 },
      waving: { label: "Waving", row: 3, frames: 4, duration: 160 },
      jumping: { label: "Jumping", row: 4, frames: 5, duration: 150 },
      failed: { label: "Failed", row: 5, frames: 8, duration: 170 },
      waiting: { label: "Waiting", row: 6, frames: 6, duration: 170 },
      running: { label: "Running", row: 7, frames: 6, duration: 120 },
      review: { label: "Review", row: 8, frames: 6, duration: 160 },
    };

    const stateIds = Object.keys(states);
    const petControls = document.querySelector("#petControls");
    const stateControls = document.querySelector("#stateControls");
    const sprite = document.querySelector("#sprite");
    const title = document.querySelector("#title");
    const meta = document.querySelector("#meta");

    let selectedPet = pets[0].id;
    let selectedState = "idle";
    let frameIndex = 0;
    let timer = null;

    function makeButton(text, pressed, onClick) {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = text;
      button.setAttribute("aria-pressed", String(pressed));
      button.addEventListener("click", onClick);
      return button;
    }

    function renderControls() {
      petControls.replaceChildren(...pets.map((pet) =>
        makeButton(pet.name, pet.id === selectedPet, () => {
          selectedPet = pet.id;
          frameIndex = 0;
          render();
        })
      ));

      stateControls.replaceChildren(...stateIds.map((stateId) =>
        makeButton(states[stateId].label, stateId === selectedState, () => {
          selectedState = stateId;
          frameIndex = 0;
          render();
        })
      ));
    }

    function backgroundPosition(state, frame) {
      const x = frame / 7 * 100;
      const y = state.row / 8 * 100;
      return `${x}% ${y}%`;
    }

    function renderSprite() {
      const pet = pets.find((item) => item.id === selectedPet);
      const state = states[selectedState];
      sprite.style.backgroundImage = `url("${pet.url}")`;
      sprite.style.backgroundPosition = backgroundPosition(state, frameIndex);
      title.textContent = `${pet.name} / ${state.label}`;
      meta.textContent = `${state.frames} frames`;
    }

    function render() {
      renderControls();
      renderSprite();
      window.clearInterval(timer);
      timer = window.setInterval(() => {
        const state = states[selectedState];
        frameIndex = (frameIndex + 1) % state.frames;
        renderSprite();
      }, states[selectedState].duration);
    }

    render();
  </script>
</body>
</html>
